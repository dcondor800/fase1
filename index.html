<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resultados Fase 1 — Copa Mundial Repsol</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  .tabs { display: flex; gap: 6px; justify-content: center; padding: 10px; background: #0a1628; flex-shrink: 0; }
  .tab-btn { background: #132040; color: #aabbcc; border: 1px solid #1e3060; border-radius: 8px; padding: 8px 20px; cursor: pointer; font-size: 0.85rem; transition: all 0.2s; }
  .tab-btn:hover { background: #1e3060; color: #fff; }
  .tab-btn.active { background: #ff6b00; border-color: #ff6b00; color: #fff; font-weight: 600; }

  .canvas-wrap { flex: 1; display: none; align-items: center; justify-content: center; background: #000; overflow: hidden; min-height: 0; }
  .canvas-wrap.active { display: flex; }
  canvas { max-width: 100%; max-height: 100%; display: block; object-fit: contain; }
</style>
</head>
<body>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab(event,'fm')">Fútbol Masculino</button>
  <button class="tab-btn" onclick="switchTab(event,'vl')">Vóley Mixto</button>
  <button class="tab-btn" onclick="switchTab(event,'pd')">Pádel</button>
  <button class="tab-btn" onclick="switchTab(event,'ff')">Fútbol Femenino</button>
</div>
<div class="canvas-wrap active" id="wrap-fm"><canvas id="canvas-fm"></canvas></div>
<div class="canvas-wrap" id="wrap-vl"><canvas id="canvas-vl"></canvas></div>
<div class="canvas-wrap" id="wrap-pd"><canvas id="canvas-pd"></canvas></div>
<div class="canvas-wrap" id="wrap-ff"><canvas id="canvas-ff"></canvas></div>

<script>
const FASE1_IMG = {
  fm: 'resultados1/futbol_masculino.jpg',
  vl: 'resultados1/voley.jpg',
  pd: 'resultados1/padel.jpg',
  ff: 'resultados1/futbol_femenino.jpg'
};

const FASE1_COORDS = {
  fm: [
    { id:'fm1_c1_1', x:36.0, y:39.0 }, { id:'fm1_c1_2', x:36.0, y:42.5 },
    { id:'fm1_c2_1', x:60.5, y:38.5 }, { id:'fm1_c2_2', x:60.5, y:42.5 },
    { id:'fm1_c3_1', x:85.5, y:38.5 }, { id:'fm1_c3_2', x:85.5, y:42.5 },
  ],
  vl: [
    { id:'vl1_c1_1', x:26.0, y:43.0 }, { id:'vl1_c1_2', x:26.0, y:46.5 },
    { id:'vl1_c1_3', x:26.0, y:50.0 }, { id:'vl1_c1_4', x:26.0, y:53.5 },
    { id:'vl1_c1_5', x:26.0, y:57.0 }, { id:'vl1_c2_1', x:47.5, y:43.0 },
    { id:'vl1_c2_2', x:47.5, y:46.5 }, { id:'vl1_c2_3', x:47.5, y:50.0 },
    { id:'vl1_c2_4', x:47.5, y:53.5 }, { id:'vl1_c2_5', x:47.5, y:57.0 },
  ],
  pd: [
    { id:'pd1_c1_1', x:27.0, y:44.5 }, { id:'pd1_c1_2', x:27.0, y:47.5 },
    { id:'pd1_c1_3', x:27.0, y:50.5 }, { id:'pd1_c1_4', x:27.0, y:53.5 },
    { id:'pd1_c1_5', x:27.0, y:56.5 }, { id:'pd1_c2_1', x:46.5, y:44.5 },
    { id:'pd1_c2_2', x:46.5, y:47.5 }, { id:'pd1_c2_3', x:46.5, y:50.5 },
    { id:'pd1_c2_4', x:46.5, y:54.0 }, { id:'pd1_c2_5', x:46.5, y:57.0 },
  ],
  ff: [
    { id:'ff2_1', x:71.0, y:44.5 }, { id:'ff2_2', x:71.0, y:48.0 },
    { id:'ff2_3', x:71.0, y:52.0 },
  ]
};

const imgCache = {};
function loadImg(key) {
  return new Promise(resolve => {
    if (imgCache[key]) { resolve(imgCache[key]); return; }
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => { imgCache[key] = img; resolve(img); };
    img.src = FASE1_IMG[key];
  });
}

function switchTab(e, sport) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.canvas-wrap').forEach(w => w.classList.remove('active'));
  e.target.classList.add('active');
  document.getElementById('wrap-' + sport).classList.add('active');
  renderSport(sport);
}

function drawScorePill(ctx, text, xPct, yPct, W, H) {
  const val = (text && text.trim()) ? text.trim() : '–';
  const cx = W * xPct / 100, cy = H * yPct / 100;
  const pw = W * 0.058 + 6, ph = H * 0.024, r = ph / 2;
  const x = cx - pw/2, y = cy - ph/2;
  const fs = Math.min(W * 0.014, H * 0.022);
  ctx.save();
  ctx.fillStyle = '#000A14';
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.arcTo(x+pw,y,x+pw,y+ph,r);
  ctx.arcTo(x+pw,y+ph,x,y+ph,r); ctx.arcTo(x,y+ph,x,y,r);
  ctx.arcTo(x,y,x+pw,y,r); ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#09bdd2';
  ctx.lineWidth = Math.max(1, W * 0.0012);
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.arcTo(x+pw,y,x+pw,y+ph,r);
  ctx.arcTo(x+pw,y+ph,x,y+ph,r); ctx.arcTo(x,y+ph,x,y,r);
  ctx.arcTo(x,y,x+pw,y,r); ctx.closePath();
  ctx.stroke();
  ctx.fillStyle = '#09bdd2';
  ctx.font = `600 ${fs}px "Segoe UI", Arial, sans-serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(val, cx, cy + 1);
  ctx.restore();
}

async function renderSport(sport) {
  const d   = JSON.parse(localStorage.getItem('fase1_data')         || '{}');
  const cal = JSON.parse(localStorage.getItem('calibration_coords') || '{}');
  const canvas = document.getElementById('canvas-' + sport);
  const img = await loadImg(sport);
  canvas.width = img.naturalWidth;
  canvas.height = img.naturalHeight;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.drawImage(img, 0, 0);
  FASE1_COORDS[sport].forEach(f => {
    const cx = cal[f.id] ? cal[f.id].x : f.x;
    const cy = cal[f.id] ? cal[f.id].y : f.y;
    drawScorePill(ctx, d[f.id], cx, cy, W, H);
  });
}

function renderAll() {
  ['fm','vl','pd','ff'].forEach(s => renderSport(s));
}

window.addEventListener('storage', e => {
  if (e.key === 'fase1_data' || e.key === 'calibration_coords') renderAll();
});

window.addEventListener('load', renderAll);
</script>
</body>
</html>
